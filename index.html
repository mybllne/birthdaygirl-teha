<html>

<head>
    <title>Happy Birthday Tehaaa</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- small styling for side photos -->
<style>
    .side-img {
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        margin: 12px;
        animation: floatUpDown 4s ease-in-out infinite;
        transition: transform 0.3s ease;
    }

    /* LEFT SIDE */
    .left-side {
        position: fixed;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        z-index: 10;
    }

    /* BIG MAIN PHOTO */
    .left-side img:nth-child(1) {
        width: 170px;   /* BIG */
        transform: rotate(-8deg);
        --r: -8deg;
    }

    /* SMALL PHOTO */
    .left-side img:nth-child(2) {
        width: 150px;   /* SMALL */
        transform: rotate(10deg);
        --r: 10deg;
    }

    /* RIGHT SIDE */
    .right-side {
        position: fixed;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        z-index: 10;
    }

    /* SMALLER RIGHT PHOTO */
    .right-side img {
        width: 170px;
        transform: rotate(-6deg);
        --r: -6deg;
    }

    /* FLOAT ANIMATION */
    @keyframes floatUpDown {
        0% { transform: translateY(0px) rotate(var(--r)); }
        50% { transform: translateY(-12px) rotate(var(--r)); }
        100% { transform: translateY(0px) rotate(var(--r)); }
    }

    @media (max-width: 768px) {
        .left-side, .right-side {
            display: none;
        }
    }
    body {
    background-color: #fff0f5;
}
</style>
</head>

<body>

    <!-- LEFT PHOTOS -->
    <div class="left-side">
        <img src="img/teha1.jpg" class="side-img">
        <img src="img/teha2.jpg" class="side-img">
    </div>

    <!-- RIGHT PHOTOS -->
    <div class="right-side">
        <img src="img/teha3.jpg" class="side-img">
    </div>

    <div class="container">
        <div class="row">
            <div class="loader">
                <button id="play">Click Teha</button>
            </div>
        </div>
    </div>

    <audio class="song" controls loop>
        <source src="music.mp3">
        Your browser isn't invited for super fun audio time.
    </audio>

    <canvas id="confetti"></canvas>

    <div class="main">
        <div class="container pt-5">
            <div class="row">

                <div class="col-12 col-xl-6 mx-auto text-center">
                    <img src="img/banner.png" class="img-fluid" style="max-width: 360px; height: auto;">
                </div>

                <div class="col-12 text-center">
                    <div id="name" class="area">🦫 Fatihah Khadijah 🦫 </div>
                </div>

                <div class="col-12 text-center">
                    <div class="type-wrap">
                        <div id="typed-strings" class="typing">
                            <h2>Happy Birthday <i id="nae">Tehaku 🦫💖</i></h2>
                            <h2>Jarang chat bukan tak sayang, memang sengaja bagi rindu 😌</h2>
                            <h2>Love you, datang KL nanti kita celeb ya 🥳✨</h2>
                            <h2>Semoga murah rezeki, panjang umur, sihat-sihat selalu 🤍</h2>
                            <h2>Have a blast today 🎉🎂</h2>
                        </div>
                        <span id="typed" style="white-space:pre;"></span>
                    </div>
                </div>

                <div class="col-12 col-xl-3 cake">
                    <img src="img/cake.gif" alt="">
                </div>

            </div>
        </div>

        <img src="img/Balloon-Border.png" width="100%" class="balloon-border">
    </div>

</body>

<script src="https://unpkg.com/magic-snowflakes/dist/snowflakes.min.js"></script>
<script src="js/jquery.js"></script>
<script src="js/typed.min.js"></script>
<script src="js/script.js"></script>

</html>
